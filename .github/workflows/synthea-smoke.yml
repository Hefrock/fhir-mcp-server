name: Synthea Lab Smoke Test

# End-to-end smoke test against a live FHIR server loaded with Synthea patients.
# Boots fhir-synthea-lab via Docker + Makefile, waits for readiness, then runs
# the tests_synthea/ suite which exercises the full tool surface.
#
# Not run on every PR — this is slow (~5-8 minutes) and provides regression
# protection against real-world FHIR quirks that unit tests can't catch.
# Runs nightly at 06:00 UTC and on manual dispatch.

on:
  schedule:
    - cron: "17 6 * * *"  # 06:17 UTC daily (offset a bit off :00 to spread load)
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke test against fhir-synthea-lab
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout fhir-mcp-server
        uses: actions/checkout@v4

      - name: Checkout fhir-synthea-lab
        uses: actions/checkout@v4
        with:
          repository: Hefrock/fhir-synthea-lab
          path: synthea-lab

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java 11 (required by Synthea)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install fhir-mcp-server (with test deps)
        run: pip install -e ".[dev]"

      - name: Boot Synthea Lab (docker up + generate + load)
        working-directory: synthea-lab
        run: make all
        timeout-minutes: 10

      - name: Wait for FHIR endpoint readiness
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/fhir/metadata > /dev/null; then
              echo "FHIR endpoint is up"
              exit 0
            fi
            echo "Waiting for FHIR endpoint... ($i/30)"
            sleep 2
          done
          echo "FHIR endpoint did not come up in time"
          exit 1

      - name: Run smoke tests
        env:
          FHIR_BASE_URL: http://localhost:8080/fhir
        run: pytest tests_synthea/ -v --tb=short

      - name: Show lab container logs on failure
        if: failure()
        working-directory: synthea-lab
        run: |
          docker compose logs --tail=200 || docker ps -a

      - name: Tear down
        if: always()
        working-directory: synthea-lab
        run: make clean || true
