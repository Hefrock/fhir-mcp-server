name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # CI runs on Ubuntu, where ruff's pip wheel works fine, so we pull both
      # the test deps (dev) and ruff (lint) from pip here.
      - name: Install (editable, with dev + lint deps)
        run: pip install -e ".[dev,lint]"

      # Lint scope here is `.` — exactly what `make lint` and the local
      # pre-commit run use, so nothing passes locally but fails in CI.
      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q
