name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (editable, with dev deps)
        run: pip install -e ".[dev]"

      # Lint scope here is `.` — exactly what `make lint` and the local
      # pre-commit run use, so nothing passes locally but fails in CI.
      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q
